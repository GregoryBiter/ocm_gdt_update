name: Build and Release OpenCart Package

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare archive name
        shell: bash
        run: |
          tag_name="${GITHUB_REF_NAME}"
          archive_name="ocm_mass_product_action-${tag_name}.ocmod.zip"
          echo "ARCHIVE_NAME=${archive_name}" >> "${GITHUB_ENV}"

      - name: Build OpenCart archive
        shell: bash
        run: |
          mkdir -p dist
          zip -r "dist/${ARCHIVE_NAME}" upload

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARCHIVE_NAME }}
          generate_release_notes: true
